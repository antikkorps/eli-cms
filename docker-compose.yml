services:
  postgres:
    image: postgres:16-alpine
    container_name: eli-cms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: eli
      POSTGRES_PASSWORD: eli_secret
      POSTGRES_DB: eli_cms
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: eli-cms-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@eli-cms.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - '5050:80'
    volumes:
      - ./pgadmin-servers.json:/pgadmin4/servers.json:ro
    depends_on:
      - postgres

volumes:
  pgdata:
